name: Build BleedingEdgeBazzite

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  repository_dispatch:
    types: [akmods_updated]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ghcr.io/vyzygota/bleedingedgebazzite:latest
          # Pozwalamy na użycie cache, aby buildy były szybsze
          cache-from: type=gha
          cache-to: type=gha,mode=max
